[app]
name = Travel Reimbursement Approval Agent
version = 1.0.0
environment = development

[llm]
provider = openai
temperature = 0.1
max_tokens = 4096
request_timeout = 60

[rag]
chunk_size = 512
chunk_overlap = 64
top_k = 5
embedding_model = text-embedding-3-small
policies_dir = data/policies
faiss_index_dir = data/faiss_index

[api]
host = 0.0.0.0
port = 8000
reload = true
workers = 1
cors_origins = *

[expense_limits]
domestic_hotel_per_night = 200.00
international_hotel_per_night = 350.00
domestic_meals_per_day = 75.00
international_meals_per_day = 100.00
domestic_flight_economy = 1500.00
international_flight_economy = 5000.00
international_flight_business = 8000.00
taxi_per_day = 100.00
incidentals_per_day = 50.00
conference_registration = 2000.00
parking_per_day = 40.00

[approval_thresholds]
auto_approve_max = 500.00
manager_approval_max = 5000.00
director_approval_max = 15000.00
vp_approval_required_above = 15000.00

[currency]
base_currency = USD
supported_currencies = USD,EUR,GBP,INR,JPY,CAD,AUD,CHF,CNY,SGD

[logging]
level = INFO
format = %%(asctime)s | %%(levelname)-8s | %%(name)s | %%(message)s
date_format = %%Y-%%m-%%d %%H:%%M:%%S
log_dir = logs
app_log = app.log
agent_log = agent.log
api_log = api.log
error_log = error.log
max_bytes = 10485760
backup_count = 5

[duplicate_detection]
time_window_days = 30
similarity_threshold = 0.85
